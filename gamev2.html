<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>幼兒識字 - 打印增強版</title>
    <style>
        /* 網頁顯示樣式 */
        body {
            font-family: 'PingFang HK', 'Microsoft JhengHei', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #FFFDE7;
            overflow: hidden;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 40px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            text-align: center;
            width: 90%;
            max-width: 500px;
            border: 8px solid #FFF176;
            position: relative;
            z-index: 10;
            transition: all 0.3s ease;
        }
        #learning-zone {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 20px 0;
            min-height: 320px;
            justify-content: center;
        }
        #image-display {
            font-size: 130px;
            margin-bottom: 10px;
            line-height: 1;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #image-display.show { opacity: 1; transform: scale(1); }
        #word-display {
            font-size: 100px;
            font-weight: bold;
            color: #222;
            margin: 0;
            line-height: 1.2;
        }
        .btn-group {
            display: flex;
            justify-content: space-around;
            gap: 20px;
            margin-top: 30px;
        }
        button {
            padding: 20px;
            font-size: 28px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            width: 45%;
            font-weight: bold;
            transition: all 0.2s;
        }
        button:active { transform: scale(0.95); }
        .btn-correct { background-color: #66BB6A; color: white; box-shadow: 0 6px #388E3C; }
        .btn-wrong { background-color: #FF7043; color: white; box-shadow: 0 6px #D84315; }
        
        .review-area { margin-top: 25px; border-top: 2px solid #EEEEEE; padding-top: 15px; display: flex; flex-direction: column; gap: 10px; align-items: center;}
        .btn-review { padding: 10px 20px; background-color: #BA68C8; color: white; font-size: 18px; border-radius: 15px; width: 80%; box-shadow: 0 4px #7B1FA2;}
        .btn-list { padding: 10px 20px; background-color: #4FC3F7; color: white; font-size: 18px; border-radius: 15px; width: 80%; box-shadow: 0 4px #0288D1;}

        /* 錯題清單彈窗 */
        #wrong-list-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.98);
            z-index: 100;
            display: none;
            flex-direction: column;
            padding: 40px 20px;
            overflow-y: auto;
        }
        .list-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        .list-item { background: #f0f0f0; padding: 15px; border-radius: 15px; text-align: center; }
        .list-item div:first-child { font-size: 40px; }
        .list-item div:last-child { font-size: 20px; font-weight: bold; }
        
        /* 功能按鈕 */
        .overlay-btns {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }
        .btn-print { background-color: #0288D1; color: white; }
        .btn-close { background-color: #757575; color: white; }

        .container.locked { border-color: #FF7043; background-color: #FBE9E7; }
        .star { position: absolute; font-size: 50px; pointer-events: none; animation: burst 0.8s ease-out forwards; z-index: 200; }
        @keyframes burst { 0% { transform: translate(-50%, -50%) scale(0); opacity: 1; } 100% { transform: translate(var(--x), var(--y)) rotate(var(--r)) scale(1.5); opacity: 0; } }

        /* --- 打印專用樣式 --- */
        @media print {
            /* 隱藏主遊戲介面和彈窗按鈕 */
            body * { visibility: hidden; background: white !important; }
            #wrong-list-overlay, #wrong-list-overlay * { visibility: visible; }
            .overlay-btns { display: none; }
            #wrong-list-overlay h1 { visibility: visible; position: absolute; top: 0; left: 0; width: 100%; text-align: center; margin: 0; padding: 10px 0;}
            
            /* 重新排版錯題清單以便打印 */
            #wrong-list-overlay { position: static; display: block; padding: 60px 0 0 0; overflow: visible; background: white;}
            .list-grid { display: block; margin-top: 20px; }
            .list-item { 
                visibility: visible;
                display: flex;
                align-items: center;
                justify-content: space-around;
                border: 2px solid #ccc;
                margin-bottom: 15px;
                padding: 15px;
                border-radius: 10px;
                background: white !important;
                page-break-inside: avoid; /* 避免一個字卡被切斷到兩頁 */
            }
            .list-item div:first-child { font-size: 60px; visibility: visible; }
            .list-item div:last-child { font-size: 50px; visibility: visible; font-weight: bold; }
        }
    </style>
</head>
<body>

<div id="wrong-list-overlay">
    <h1 style="color: #0288D1; text-align: center;">📖 錯題字卡牆</h1>
    <div id="list-content" class="list-grid"></div>
    <div class="overlay-btns">
        <button class="btn-print" onclick="window.print()">🖨️ 打印錯題字卡</button>
        <button class="btn-close" onclick="closeList()">返回練習</button>
    </div>
</div>

<div class="container" id="game-box">
    <div id="category-tag" style="background: #FFF9C4; color: #FBC02D; padding: 8px 20px; border-radius: 20px; font-size: 18px; font-weight: bold; display: inline-block;">準備開始</div>
    <div id="learning-zone">
        <div id="image-display"></div>
        <p id="word-display">點擊開始</p>
    </div>
    <div class="btn-group">
        <button id="btn-wrong" class="btn-wrong" onclick="handleWrong()">不正確</button>
        <button id="btn-correct" class="btn-correct" onclick="handleCorrect()">✅ 正確</button>
    </div>
    <div class="review-area">
        <button id="btn-review" class="btn-review" onclick="toggleReviewMode()">🔄 複習錯題 (0)</button>
        <button class="btn-list" onclick="showWrongList()">📋 查看所有錯題</button>
        <div style="margin-top: 5px; color: #999; font-size: 14px;">累積得分：<span id="score">0</span></div>
    </div>
</div>

<script>
    const dictionary = {
        "昆蟲世界": { "蝴蝶": "🦋", "蜻蜓": "🛸", "蜜蜂": "🐝", "螞蟻": "🐜", "甲蟲": "🐞", "螢火蟲": "🌟", "蟬": "🦟", "螳螂": "🦗", "毛毛蟲": "🐛", "瓢蟲": "🐞" },
        "海洋生物": { "鯨魚": "🐋", "海豚": "🐬", "鯊魚": "🦈", "章魚": "🐙", "海龜": "🐢", "螃蟹": "🦀", "蝦": "🦐", "水母": "🪼", "海馬": "🐴", "貝殼": "🐚" },
        "面試必學": { "禮貌": "🙇", "觀察": "🧐", "分享": "🎁", "合作": "🤝", "安靜": "🤫", "排隊": "🚶", "謝謝": "🙏", "你好": "👋", "對不起": "😢", "幫忙": "🆘", "老師": "👩‍🏫", "學校": "🏫", "朋友": "🧑‍🤝‍🧑", "學習": "📚", "聽話": "👂" },
        "日常認知": { "太陽": "☀️", "月亮": "🌙", "星星": "⭐", "下雨": "🌧️", "水果": "🍎", "蔬菜": "🥦", "麵包": "🍞", "穿衣": "👕", "洗手": "🧼", "刷牙": "🪥" }
    };

    // 讀取記憶功能
    let score = parseInt(localStorage.getItem('kids_score')) || 0;
    let wrongWords = JSON.parse(localStorage.getItem('kids_wrongWords')) || [];

    let currentWord = "";
    let reviewMode = false; 
    let isLocked = false; 
    let categories = Object.keys(dictionary);

    const gameBox = document.getElementById('game-box');
    const imageDisplay = document.getElementById('image-display');
    const wordDisplay = document.getElementById('word-display');
    const correctBtn = document.getElementById('btn-correct');
    const wrongBtn = document.getElementById('btn-wrong');
    const reviewBtn = document.getElementById('btn-review');
    const scoreText = document.getElementById('score');

    // 初始化得分顯示
    scoreText.innerText = score;

    function saveToStorage() {
        localStorage.setItem('kids_score', score);
        localStorage.setItem('kids_wrongWords', JSON.stringify(wrongWords));
    }

    function nextQuestion() {
        isLocked = false;
        gameBox.classList.remove('locked');
        imageDisplay.classList.remove('show');
        correctBtn.innerText = "✅ 正確";
        wrongBtn.innerText = "不正確"; // 重置紅色按鈕名稱

        if (reviewMode && wrongWords.length > 0) {
            currentWord = wrongWords[Math.floor(Math.random() * wrongWords.length)];
            document.getElementById('category-tag').innerText = "✨ 複習中 ✨";
        } else {
            if (reviewMode) toggleReviewMode();
            const cat = categories[Math.floor(Math.random() * categories.length)];
            const currentWords = Object.keys(dictionary[cat]);
            currentWord = currentWords[Math.floor(Math.random() * currentWords.length)];
            document.getElementById('category-tag').innerText = cat;
        }
        
        for (let cat of categories) {
            if (dictionary[cat][currentWord]) { imageDisplay.innerText = dictionary[cat][currentWord]; break; }
        }
        wordDisplay.innerText = currentWord;
        updateReviewButton();
    }

    function speak() {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(currentWord);
        msg.lang = 'zh-HK'; msg.rate = 0.6;
        window.speechSynthesis.speak(msg);
    }

    function handleWrong() {
        speak();
        isLocked = true;
        gameBox.classList.add('locked');
        imageDisplay.classList.add('show');
        correctBtn.innerText = "✅ 我學會了";
        wrongBtn.innerText = "再嘗試"; // 錯了之後，更改按鈕名稱
        
        if (!wrongWords.includes(currentWord)) {
            wrongWords.push(currentWord);
            saveToStorage(); // 儲存錯題
        }
        updateReviewButton();
    }

    function handleCorrect() {
        if (isLocked) { 
            showStarEffect(); // 錯誤鎖定模式下，學會了也有星星
            setTimeout(nextQuestion, 800); 
        } else {
            score++; 
            scoreText.innerText = score;
            if (reviewMode) {
                wrongWords = wrongWords.filter(w => w !== currentWord);
            }
            saveToStorage(); // 儲存得分與清單
            showStarEffect(); // 正常答對有星星
            nextQuestion();
        }
    }

    function showStarEffect() {
        for (let i = 0; i < 15; i++) {
            const star = document.createElement('div');
            star.innerHTML = '⭐'; star.className = 'star';
            const angle = (Math.PI * 2 / 15) * i;
            const dist = 180 + Math.random() * 60;
            star.style.setProperty('--x', Math.cos(angle) * dist + 'px');
            star.style.setProperty('--y', Math.sin(angle) * dist + 'px');
            const rect = gameBox.getBoundingClientRect();
            star.style.left = (rect.left + rect.width / 2) + 'px';
            star.style.top = (rect.top + rect.height / 2) + 'px';
            document.body.appendChild(star);
            setTimeout(() => star.remove(), 800);
        }
    }

    function showWrongList() {
        const listContent = document.getElementById('list-content');
        listContent.innerHTML = '';
        if (wrongWords.length === 0) {
            listContent.innerHTML = '<p style="grid-column: 1/-1; font-size: 20px; color: #666; text-align: center;">暫時沒有錯題喔，加油！</p>';
        } else {
            wrongWords.forEach(word => {
                let emoji = "";
                for (let cat of categories) { if (dictionary[cat][word]) { emoji = dictionary[cat][word]; break; } }
                const item = document.createElement('div');
                item.className = 'list-item';
                item.innerHTML = `<div>${emoji}</div><div>${word}</div>`;
                listContent.appendChild(item);
            });
        }
        document.getElementById('wrong-list-overlay').style.display = 'flex';
    }

    function closeList() { document.getElementById('wrong-list-overlay').style.display = 'none'; }
    
    function toggleReviewMode() { 
        if (!reviewMode && wrongWords.length === 0) {
            alert("太棒了，目前沒有錯題！");
            return;
        }
        reviewMode = !reviewMode; 
        reviewBtn.classList.toggle('active');
        nextQuestion(); 
    }
    function updateReviewButton() { reviewBtn.innerText = `🔄 ${reviewMode ? '停止' : '複習'}錯題 (${wrongWords.length})`; }

    // 初始化第一題
    nextQuestion();
</script>
</body>
</html>
